specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: rangezone
    network: rootstock-testnet
    source:
      address: "0x73689f97092c0b27DDd90cd59b14Ca691dE754D7"
      abi: rangezone
      startBlock: 7487755
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Claimed
        - MarketCreated
        - Resolved
        - Staked
      abis:
        - name: rangezone
          file: ./abis/rangezone.json
      eventHandlers:
        - event: Claimed(indexed uint256,indexed address,uint256)
          handler: handleClaimed
        - event: MarketCreated(indexed uint256,int256,uint256,uint256,uint256)
          handler: handleMarketCreated
        - event: Resolved(indexed uint256,uint8,int256)
          handler: handleResolved
        - event: Staked(indexed uint256,indexed address,uint8,uint256)
          handler: handleStaked
      file: ./src/rangezone.ts
